openapi: 3.0.3
info:
  title: T5 Field OS Web API
  version: 0.1.0
paths:
  /api/health:
    get:
      summary: Web service health
      responses:
        '200':
          description: OK
  /api/status:
    get:
      summary: Device status snapshot including unread message and cache activity indicators
      description: unreadMessages is derived from /meshtastic/messages file count; cacheActivity indicates map-cache lookup activity within a recent window.
      responses:
        '200':
          description: Current status JSON
        '503':
          description: Status context unavailable
  /api/hardware:
    get:
      summary: Hardware readiness snapshot for boot-initialized peripherals
      responses:
        "200":
          description: Hardware readiness payload
        "503":
          description: Hardware context unavailable
  /api/apps/order:
    get:
      summary: Returns configured app order JSON from SD config
      responses:
        '200':
          description: App order config
        '503':
          description: SD not mounted
        '404':
          description: Missing config
  /api/apps/install:
    post:
      summary: Install an app manifest to SD storage
      responses:
        '200':
          description: Installed
        '400':
          description: Invalid request
        '503':
          description: SD not mounted
  /api/apps/remove:
    post:
      summary: Remove an installed app manifest from SD storage
      responses:
        '200':
          description: Removed
        '400':
          description: Invalid request
        '503':
          description: SD not mounted
        '404':
          description: App not installed
  /api/apps/update:
    post:
      summary: Update an installed app manifest on SD storage
      responses:
        '200':
          description: Updated
        '400':
          description: Invalid request
        '503':
          description: SD not mounted
        '404':
          description: App not installed

  /api/weather/cache:
    get:
      summary: Returns cached weather JSON
      responses:
        "200":
          description: Cached weather payload
        "503":
          description: SD not mounted
        "404":
          description: Missing weather cache file

  /api/cache/stats:
    get:
      summary: Returns map cache hit/miss counters
      responses:
        "200":
          description: Cache stats payload
        "503":
          description: Cache context unavailable

  /api/radio/scans:
    get:
      summary: List saved radio scan log files
      responses:
        "200":
          description: Radio scan file list
        "503":
          description: SD not mounted
        "404":
          description: Missing scans directory
  /api/radio/control:
    get:
      summary: Returns effective radio scanner control configuration
      responses:
        "200":
          description: Radio scanner control payload
        "503":
          description: Cache context unavailable
    post:
      summary: Updates radio scanner control configuration written to /config/radio.json
      responses:
        "200":
          description: Update accepted
        "400":
          description: Invalid radio control payload
        "503":
          description: Cache context unavailable

  /api/meshtastic/stats:
    get:
      summary: Returns Meshtastic storage counts
      responses:
        "200":
          description: Meshtastic message/node counts
        "503":
          description: SD not mounted




  /api/files/list:
    get:
      summary: List files/directories within allowed roots with pagination
      responses:
        "200":
          description: File list payload
        "403":
          description: Forbidden path
        "404":
          description: Directory not found
        "503":
          description: SD not mounted

  /api/files/delete:
    post:
      summary: Delete a file within allowed roots
      responses:
        "200":
          description: File delete result
        "400":
          description: Invalid request
        "403":
          description: Forbidden path
        "500":
          description: IO error
        "503":
          description: SD not mounted
  /api/maps/status:
    get:
      summary: Offline maps runtime status including coverage and cache counters
      responses:
        "200":
          description: Map status payload including dgpsMode and dgpsQuality
        "503":
          description: Map context unavailable

  /api/maps/prefetch:
    post:
      summary: Schedule map prefetch task
      responses:
        "200":
          description: Prefetch scheduling result payload
        "400":
          description: Invalid prefetch payload
        "503":
          description: Cache context unavailable

  /api/maps/cache:
    get:
      summary: Map cache statistics for active provider
      responses:
        "200":
          description: Map cache stats payload
        "503":
          description: SD not mounted

  /api/maps/cache/clear:
    post:
      summary: Recursively clear map cache for active provider and return removed file count
      responses:
        "200":
          description: Map cache clear payload with provider and filesRemoved
        "503":
          description: SD not mounted
  /api/gps/status:
    get:
      summary: Live raw and DGPS-aware GPS status snapshot
      responses:
        "200":
          description: GPS status payload with DGPS mode and packet counters
        "503":
          description: GPS context unavailable

  /api/gps/dgps:
    get:
      summary: Latest DGPS correction packet and predicted correction/rate vectors
      responses:
        "200":
          description: DGPS packet payload including origin, filtered/predicted ENU corrections, and correction rates
        "503":
          description: GPS context unavailable
  /api/gps/tracks:
    get:
      summary: List saved GPS track files
      responses:
        "200":
          description: GPS track file list
        "503":
          description: SD not mounted
        "404":
          description: Missing tracks directory

  /api/gps/tracks/clear:
    post:
      summary: Clear GPS track history by deleting files under /gps/tracks
      responses:
        "200":
          description: Clear result including removed file count
        "503":
          description: SD not mounted
        "404":
          description: Missing tracks directory
  /api/power/policy:
    get:
      summary: Returns effective power policy and whether SD config was present
      responses:
        "200":
          description: Power policy payload
        "503":
          description: Cache context unavailable
